# ISLES24 dataset config with RAW Team1 modalities for nnU-Net export
# Based on isles24_team1.yaml but with RAW (unnormalized) values.
#
# Team1 modalities: CTA, CBF, CBV, MTT, TMAX (5 channels)
#
# Usage:
#   python3 -m scripts.nnunet.convert_isles24_2d_dataset_to_nnunet \
#       --config-name=convert_nnunet_local \
#       dataset=isles24_nnunet_raw_team1 \
#       nnunet.dataset_name=ISLES24_2D_RAW_TEAM1 \
#       nnunet.dataset_id=051

defaults:
  - isles24

name: isles24
modalities: ['CTA_RAW', 'CBF_RAW', 'CBV_RAW', 'MTT_RAW', 'TMAX_RAW']
num_modalities: 5
