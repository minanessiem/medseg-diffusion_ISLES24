# ISLES24 dataset config with RAW modalities for nnU-Net export
# RAW mode passes through raw intensity values without normalization,
# allowing nnU-Net to apply its own preprocessing strategy.
#
# Usage:
#   python3 -m scripts.nnunet.convert_isles24_2d_dataset_to_nnunet \
#       --config-name=convert_nnunet_local \
#       dataset=isles24_nnunet_raw \
#       nnunet.dataset_name=ISLES24_2D_RAW

defaults:
  - isles24

name: isles24
modalities: ['CBF_RAW', 'TMAX_RAW']
num_modalities: 2
