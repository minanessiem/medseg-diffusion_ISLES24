# ISLES26 800K sweep config (cluster)
# Mirrors cluster_800K_sweep settings while switching to ISLES26 data profile/env.
#
# Usage:
#   python3 -m scripts.slurm.single_job_runner --config-name isles26_cluster_800K_sweep --gpus 2

defaults:
  - cluster
  - override /environment: isles26_cluster
  - override /data_profile: isles26_2d_online_t1raw
  - override /model: medsegdiff_256_4l_32c_6x4a_128t_1btl_medium_simple
  - override /loss: multitask_equal
  - override /augmentation: aggressive_2d
  - override /training: train_800Kms_ampbfloat16
  - override /scheduler: warmup_cosine_20Ksteps
  - override /diffusion: openai_ddim_50steps
  - override /logging: ddim_50steps
  - override /validation: default

data_runtime:
  train_batch_size: 32

environment:
  training:
    output_root: '/mnt/outputs/medsegdiff_isles26_800K_sweep/'
