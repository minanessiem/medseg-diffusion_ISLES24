# @package _global_
#
# ISLES24 conversion preset (cluster environment, baseline modalities, full validation export).
# Canonical usage:
#   python3 -m scripts.nnunet.convert_to_nnunet \
#       --config-name=nnunet/convert/isles24_cluster_baseline

defaults:
  - cluster
  - /environment: isles_cluster
  - /data_profile: isles24_2d_online_baseline
  - _self_

dataset:
  active_subsets:
    train: train
    val: val
    sample: val
