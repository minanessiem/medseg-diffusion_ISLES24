# @package _global_
#
# ISLES26 conversion preset (cluster environment, T1 raw modality, val_full export).
# Canonical usage:
#   python3 -m scripts.nnunet.convert_to_nnunet \
#       --config-name=nnunet/convert/isles26_cluster_t1raw

defaults:
  - cluster
  - /environment: isles26_cluster
  - /data_profile: isles26_2d_online_t1raw
  - _self_

dataset:
  active_subsets:
    train: train
    val: val_full
    sample: val_full
