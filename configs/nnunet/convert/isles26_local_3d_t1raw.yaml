# @package _global_
#
# ISLES26 conversion preset (local environment, T1 raw modality, 3D volumes, val_full export).
# Canonical usage:
#   python3 -m scripts.nnunet.convert_to_nnunet \
#       --config-name=nnunet/convert/isles26_local_3d_t1raw

defaults:
  - local
  - /environment: isles26_local
  - /data_profile: isles26_3d_fullvol_t1raw
  - _self_

dataset:
  active_subsets:
    train: train
    val: val_full
    sample: val_full
