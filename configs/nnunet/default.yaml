# nnU-Net export configuration
# Used by scripts/nnunet/convert_isles24_2d_dataset_to_nnunet.py

# Output settings
output_dir: './nnunet_raw'           # Base output directory (nnUNet_raw equivalent)
dataset_id: ${dataset.nnunet.dataset_id}      # 3-digit nnU-Net dataset ID from dataset profile
dataset_name: ${dataset.nnunet.dataset_name}  # Dataset name suffix from dataset profile

# Test mode - for quick validation of the export pipeline
test: true                            # Set to false for full export
test_max_slices: 100                  # Max slices per split when test=true

# Split selection - choose which splits to export
export_train: true                    # Export training set to imagesTr/labelsTr
export_test: true                     # Export test/validation set to imagesTs/labelsTs

# Parallel processing
parallel:
  enabled: true                       # Enable parallel export
  num_workers: 32                     # Number of parallel threads

