# Local ISLES24 3D random-patch discriminative SwinUNETR run.
#
# Mirrors local_isles26_3d_randompatch_swinunetr.yaml structure,
# but targets ISLES24 3D random-patch data profile.

defaults:
  - local
  - override /environment: isles_local
  - override /model: swinunetr_base
  - override /data_profile: isles24_3d_randompatch_baseline
  - override /diffusion: discriminative
  - override /loss: discriminative_dicebce
  - override /logging: 3d_discriminative
  - override /validation: sliding_window_3d_metrics_subset
  - override /training: train_100Kms_ampbfloat16
  - override /augmentation: aggressive_3d
  - _self_

training:
  checkpoint_best:
    enabled: true
    metric_name: dice_3d

