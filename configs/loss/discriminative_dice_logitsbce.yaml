# Dice plus logits-native BCE discriminative loss.
#
# This is the first logit/probability contract baseline:
# Dice receives probabilities, while BCE receives raw logits and uses
# BCEWithLogitsLoss behavior internally.

defaults:
  - discriminative_base

discriminative:
  terms:
    - loss: DiceLoss
      input_domain: probabilities
      weight: 1.0
      params:
        smooth: 1.0e-5
        apply_sigmoid: false
      supervision:
        mode: final_only
        heads: [0]
        weights: [1.0]

    - loss: BCELoss
      input_domain: logits
      weight: 1.0
      params:
        pos_weight: null
        apply_sigmoid: true
      supervision:
        mode: final_only
        heads: [0]
        weights: [1.0]
