# Dice + logits-native BCE with final-head MONAI HausdorffDTLoss.
#
# Dice/BCE use DynUNet's inherited all-head schedule. The boundary-aware
# Hausdorff term stays on the final head to avoid noisy coarse-head gradients.

defaults:
  - discriminative_deepsupervision_base

discriminative:
  terms:
    - loss: DiceLoss
      input_domain: probabilities
      weight: 1.0
      params:
        smooth: 1.0e-5
        apply_sigmoid: false
      supervision:
        mode: inherit_default
        heads: null
        weights: null

    - loss: BCELoss
      input_domain: logits
      weight: 1.0
      params:
        pos_weight: null
        apply_sigmoid: true
      supervision:
        mode: inherit_default
        heads: null
        weights: null

    - loss: HausdorffDTLoss
      input_domain: probabilities
      weight: 0.05
      params:
        alpha: 2.0
        include_background: true
        to_onehot_y: false
        sigmoid: false
        softmax: false
        reduction: mean
        batch: false
      supervision:
        mode: final_only
        heads: [0]
        weights: [1.0]
