# Dice plus logits-native BCE with DynUNet deep supervision.

defaults:
  - discriminative_deepsupervision_base

discriminative:
  terms:
    - loss: DiceLoss
      input_domain: probabilities
      weight: 1.0
      params:
        smooth: 1.0e-5
        apply_sigmoid: false
      supervision:
        mode: inherit_default
        heads: null
        weights: null

    - loss: BCELoss
      input_domain: logits
      weight: 1.0
      params:
        pos_weight: null
        apply_sigmoid: true
      supervision:
        mode: inherit_default
        heads: null
        weights: null
