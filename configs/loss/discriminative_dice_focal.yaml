# Dice plus MONAI logits-native FocalLoss.
#
# This probes whether hard-voxel emphasis sharpens boundaries while preserving
# a simple probability-domain Dice overlap anchor.

defaults:
  - discriminative_base

discriminative:
  terms:
    - loss: DiceLoss
      input_domain: probabilities
      weight: 1.0
      params:
        smooth: 1.0e-5
        apply_sigmoid: false
      supervision:
        mode: final_only
        heads: [0]
        weights: [1.0]

    - loss: FocalLoss
      input_domain: logits
      weight: 1.0
      params:
        include_background: true
        to_onehot_y: false
        gamma: 2.0
        alpha: null
        weight: null
        reduction: mean
        use_softmax: false
      supervision:
        mode: final_only
        heads: [0]
        weights: [1.0]
