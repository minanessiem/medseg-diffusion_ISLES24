# Pure segmentation loss for discriminative models.
# No diffusion/MSE component - direct mask supervision.
#
# Discriminative losses are defined as explicit terms. Each term declares
# the loss implementation, input tensor domain, weight, parameters, and
# supervision schedule. No loss defaults are implied in code.
#
# Concrete child configs define the total loss through discriminative.terms.

# Primary loss type (set to NONE - no diffusion loss used)
loss_type: NONE

# Auxiliary losses section (required by openai_adapter, ignored by discriminative)
# Keep disabled to avoid confusion
auxiliary_losses:
  enabled: false
  diffusion_weight: 0.0
  dice:
    enabled: false
    weight: 0.0
    smooth: 1.0e-5
    apply_sigmoid: false
  bce:
    enabled: false
    weight: 0.0
    pos_weight: null
    apply_sigmoid: false
  calibration:
    enabled: false
    weight: 0.0
    apply_sigmoid: false
  warmup_steps: 0

# ============================================================
# Discriminative-specific loss configuration
# Used by DiscriminativeAdapter (not auxiliary_losses)
# Each loss can be enabled/disabled independently
# ============================================================
discriminative:
  deep_supervision:
    enabled: false       # Baseline: single-head supervision
    final_head: 0        # MONAI DynUNet (1.3.0) final prediction index in stacked output
    head_parser: stacked # Expected parser for deep-supervised DynUNet training outputs
