# Dice+BCE discriminative loss with deep supervision enabled.
#
# Inherits the no-DS baseline and only activates deep supervision behavior.
# Terms explicitly declare their loss implementation, input tensor domain,
# and supervision schedule.

defaults:
  - discriminative_dicebce

discriminative:
  deep_supervision:
    enabled: true
    final_head: 0
    head_parser: stacked
    default_supervision:
      mode: all_heads
      weighting: geometric
      decay: 0.5
      normalize: false

  terms:
    - loss: DiceLoss
      input_domain: probabilities
      weight: 1.0
      params:
        smooth: 1.0e-5
        apply_sigmoid: false
      supervision:
        mode: inherit_default
        heads: null
        weights: null

    - loss: BCELoss
      input_domain: probabilities
      weight: 1.0
      params:
        pos_weight: null
        apply_sigmoid: false
      supervision:
        mode: inherit_default
        heads: null
        weights: null
