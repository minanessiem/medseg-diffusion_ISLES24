defaults:
  - sliding_window
  - _self_

# Full 3D metric bundle for offline/expensive validation runs.
metrics:
  - name: ThreeDMetricsAggregator
    params: {}

# Metric keys shown in tqdm validation postfix.
progress_metrics:
  - dice_3d
  - lesion_f1_3d
  - hd95_3d

# Align best-checkpoint metric with this 3D validation bundle.
training:
  checkpoint_best:
    metric_name: dice_3d
