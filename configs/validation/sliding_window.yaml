defaults:
  - default

inference:
  mode: sliding_window
  sliding_window:
    enabled_loader_modes:
      - full_volumes_3d
      - random_patches_3d
    # Null means: infer from dataset preprocessing ROI
    # - data_mode.dim=3d -> dataset.preprocessing_configs.roi.volume_3d
    # - data_mode.dim=2d -> dataset.preprocessing_configs.roi.slice_2d
    roi_size: null
    sw_batch_size: 1
    overlap: 0.5
    blend_mode: gaussian
    padding_mode: constant
