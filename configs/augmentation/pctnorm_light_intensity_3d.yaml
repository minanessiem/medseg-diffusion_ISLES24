# 3D augmentation calibrated for percentile-normalized [0, 1] T1 inputs.

defaults:
  - aggressive_3d
  - _self_

_name_: pctnorm_light_intensity_3d

intensity:
  random_shift:
    prob: 0.3
    offsets: 0.03

  random_scale:
    prob: 0.3
    factors: 0.05

  random_gamma:
    prob: 0.15
    gamma_range: [0.9, 1.1]

  random_gaussian_noise:
    prob: 0.15
    std: 0.01

  random_gaussian_blur:
    prob: 0.15
    sigma_range: [0.3, 0.8]
    sigma_range_z: [0.3, 0.8]
