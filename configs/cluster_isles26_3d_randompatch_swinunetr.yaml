# Cluster ISLES26 3D random-patch discriminative SwinUNETR run.
#
# Uses full SwinUNETR base architecture (no local debug downsizing).
# Encodes the tuned training/validation cadence used for cluster ramp-up runs.

defaults:
  - cluster
  - override /distribution: dp
  - override /environment: isles26_cluster
  - override /model: swinunetr_base
  - override /data_profile: isles26_3d_randompatch_t1raw
  - override /diffusion: discriminative
  - override /loss: discriminative_dicebce
  - override /logging: 3d_discriminative
  - override /validation: sliding_window_3d_metrics_subset
  - override /training: train_100Kms_ampbfloat16
  - override /augmentation: aggressive_3d
  - _self_

distribution:
  timeout_minutes: 300

model:
  image_size: 128

# Runtime overrides (can still be overridden from CLI when needed).
data_runtime:
  loader_smoke_testing: false
  train_batch_size: 3
  num_train_workers: 8
  num_valid_workers: 8

validation:
  val_batch_size: 1
  validation_interval: 5000
  inference:
    sliding_window:
      sw_batch_size: 4

logging:
  image_log_interval: 1000
  min_log_step: 100

environment:
  training:
    output_root: '/mnt/outputs/discriminative_swinunetr_isles26_3d_randompatch_250526/'

dataset:
  active_subsets:
    val: val_full
  preprocessing_configs:
    random_patches_3d:
      patches_per_volume:
        train: 32

training:
  checkpoint_interval:
    save_interval: 1000
  checkpoint_best:
    enabled: true
    metric_name: dice_3d
